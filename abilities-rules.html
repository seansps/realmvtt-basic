<div>
  <label label="Dice Used to Roll" textalign="left"></label>
</div>

<div style="margin-top: 4px">
  <stringfield
    field="roll"
    label="Roll"
    placeholder="Enter dice string..."
  ></stringfield>
</div>

<div>
  <label label="Related Attribute" textalign="left"></label>
</div>

<div style="margin-top: 4px">
  <stringfield
    field="attribute"
    label="Attribute"
    placeholder="Enter Attribute name..."
  ></stringfield>
</div>

<div style="margin-top: 4px">
  <label label="When Rolling..." textalign="left"></label>
</div>

<div style="margin-top: 4px">
  <radio field="addSubValue" label="Add Value" color="primary"></radio>
</div>

<div style="margin-top: 4px">
  <radio field="addSubValue" label="Subtract Value" color="primary"></radio>
</div>

<div style="margin-top: 4px">
  <radio field="addSubAttr" label="Add Attribute" color="primary"></radio>
</div>

<div style="margin-top: 4px">
  <radio field="addSubAttr" label="Subtract Attribute" color="primary"></radio>
</div>

<div style="margin-top: 4px">
  <fxcontrol field="animation" label="Animation"></fxcontrol>
</div>
